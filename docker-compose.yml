# ─── Docker Compose for CryptoSmartTrade (Server Mode) ───────────

services:
  backend:
    build:
      context: .
      target: backend-runtime
    container_name: cryptosmarttrade-backend
    ports:
      - "4001:4001"
    env_file:
      - .env
    volumes:
      - ./trading_app.db:/app/trading_app.db
    command: node packages/api-gateway/src/server.js
    restart: always

  frontend:
    build:
      context: .
      target: frontend-runtime
    container_name: cryptosmarttrade-frontend
    ports:
      - "4000:80"
    depends_on:
      - backend
    restart: unless-stopped

  strategy-ai:
    build:
      context: ./packages/strategy-ai
    container_name: cryptosmarttrade-strategy
    ports:
      - "8001:8000"
    environment:
      - GATEWAY_INTERNAL_URL=http://backend:4001
      - STRATEGY_AI_MODE=${STRATEGY_AI_MODE:-off}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct}
    depends_on:
      - backend
    restart: always

  quant-engine:
    build:
      context: ./packages/quant-engine
    container_name: cryptosmarttrade-quant
    ports:
      - "8002:8002"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:4001}
      - STRATEGY_AI_URL=${STRATEGY_AI_URL:-http://strategy-ai:8000}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - DB_PATH=${DB_PATH:-/app/trading_app.db}
      - ETL_SYMBOLS=${ETL_SYMBOLS:-BTCUSDT,ETHUSDT}
      - ETL_INTERVAL=${ETL_INTERVAL:-15m}
      - DECAY_THRESHOLD=${DECAY_THRESHOLD:-70}
    volumes:
      - quant_data:/app/data
      - ./trading_app.db:/app/trading_app.db
    depends_on:
      - backend
      - strategy-ai
    restart: always

volumes:
  quant_data:

# ─── Docker Compose for CryptoSmartTrade (Server Mode) ───────────

services:
  backend:
    build:
      context: .
      target: backend-runtime
    container_name: cryptosmarttrade-backend
    ports:
      - "4001:4001"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - ./trading_app.db:/app/trading_app.db
    command: npm start
    restart: always

  frontend:
    build:
      context: .
      target: frontend-runtime
    container_name: cryptosmarttrade-frontend
    ports:
      - "4000:80"
    depends_on:
      - backend
    restart: unless-stopped
